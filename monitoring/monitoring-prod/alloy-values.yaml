image:
  repository: grafana/alloy
  tag: v1.16.0

controller:
  type: daemonset

serviceAccount:
  create: true

rbac:
  create: true

alloy:
  stabilityLevel: generally-available
  listenPort: 12345
  clustering:
    enabled: true
    
  configMap:
    create: false
    name: alloy-config
    key: config.alloy

  resources:
    requests:
      cpu: 100m
      memory: 50Mi
    limits:
      cpu: 500m
      memory: 512Mi

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 12345
      targetPort: 12345
      protocol: TCP

ingress:
  enabled: false

extraObjects:
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: alloy-ui
      namespace: monitoring
      annotations:
        nginx.org/redirect-to-https: "true"
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-secret: alloy-basic-auth
        nginx.ingress.kubernetes.io/auth-realm: "Restricted"
    spec:
      ingressClassName: nginx-external
      rules:
        - host: alloy.monitoring.labmeet.xyz
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: alloy
                    port:
                      number: 12345