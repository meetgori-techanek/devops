deploymentMode: Distributed

loki:
  auth_enabled: false

  compactor:
    retention_enabled: true
    delete_request_store: s3

  structuredConfig:
    ingester:
      chunk_idle_period: 1h
      chunk_target_size: 1536000
      max_chunk_age: 1h
      lifecycler:
        ring:
          replication_factor: 1  
          
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: meetg-loki-chunks
      ruler: meetg-loki-chunks
      admin: meetg-loki-chunks
    s3:
      region: us-east-1
      endpoint: https://s3.us-east-1.amazonaws.com
      s3ForcePathStyle: false

  storage_config:
    aws:
      region: us-east-1
      bucketnames: meetg-loki-chunks
      s3forcepathstyle: false
      endpoint: https://s3.us-east-1.amazonaws.com

  ingester:
    chunk_encoding: snappy

  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    discover_log_levels: true
    volume_enabled: true
    retention_period: 672h #28 days
  querier:
    max_concurrent: 4

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
singleBinary:
  replicas: 0

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

querier:
  replicas: 1
  maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi
      
queryFrontend:
  replicas: 1
  maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "100m"
      memory: 512Mi
      
queryScheduler:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "100m"
      memory: 512Mi

distributor:
  replicas: 1
  maxUnavailable: 1 
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "100m"
      memory: 512Mi
      
compactor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "100m"
      memory: 512Mi
      
indexGateway:
  replicas: 1
  maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "100m"
      memory: 512Mi

chunksCache:
  enabled: false
  allocatedMemory: 512

resultsCache:
  enabled: false
  allocatedMemory: 512

minio:
  enabled: false
